name: Deploy Mason Forge Cloud

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cloud/**"
      - ".github/workflows/deploy-mason-forge-cloud.yml"

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloud

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Mason Forge Worker
        run: npm run check

      - name: Cloudflare deployment dry run
        run: npx wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply mason-forge-cloud --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Mason Forge Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          node -e "fetch('https://mason-forge-cloud.mason-forge-ssx.workers.dev/health').then(r => { if (!r.ok) throw new Error('Health check failed'); return r.json(); }).then(x => { if (x.status !== 'online') throw new Error('Worker not online'); console.log(x); })"
